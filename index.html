const templates={Arithmetic:[['What is 18 + 24?',42,[40,44,52]],['What is 3/5 as a percent?','60%',['35%','50%','65%']],['What is the GCF of 36 and 60?',12,[6,18,24]],['What is 25% of 240?',60,[40,80,100]],['What is the LCM of 8 and 12?',24,[16,36,48]],['A value rises from 80 to 100. Percent increase?','25%',['20%','40%','80%']],['How many factors does 72 have?',12,[8,10,14]],['Which is largest?','7/8',['0.72','82%','5/6']],['Smallest integer divisible by 4, 6, and 9?',36,[18,54,72]],['150% of 40 equals?',60,[45,80,100]]],Algebra:[['Solve: 3x+5=20',5,[3,7,15]],['Solve: 2(x-4)=18',13,[5,9,11]],['If 4x+3=2x+15, x = ?',6,[4,8,12]],['Solve: x/4+6=11',20,[5,17,44]],['Solve: -3x <= 12','x >= -4',['x <= -4','x >= 4','x <= 4']],['Solve: 5-x >= 2','x <= 3',['x >= 3','x <= 7','x >= 7']],['Solve: 7-2x=-5',6,[-6,1,12]],['Solve: x/3 >= 5','x >= 15',['x <= 15','x >= 8','x <= 8']],['Solve: -x < 7','x > -7',['x < -7','x > 7','x < 7']],['Solve: 9=(x+3)/2',15,[6,12,21]]],
'Word Problems':[['180 miles in 3 hours is what speed?','60 mph',['45 mph','90 mph','120 mph']],['5 pages/min for 45 pages takes?','9 minutes',['5 minutes','15 minutes','40 minutes']],['Pipe fills 1/6 tank/hr. In 2 hr?','1/3',['1/2','2/3','1/6']],['Rates 1/4 and 1/6 job/hr combine to?','5/12',['1/10','1/5','7/12']],['Ratio red:blue is 3:5. Red 24, blue?',40,[15,30,64]],['2:7 total 45. Smaller part?',10,[5,14,35]],['40% acid in 30 liters gives acid liters?',12,[8,10,18]],['x:y=6:11 and x+y=51. y?',33,[18,22,30]],['Speed doubles, same distance. Time multiplied by?','1/2',[2,4,1]],['3 machines make 90 parts in 5 hr. Per machine per hour?',6,[3,15,18]]],Geometry:[['Triangle angles 40 and 65. Third?','75 degrees',['65 degrees','85 degrees','105 degrees']],['Triangle area base 10 height 6?',30,[16,60,120]],['Right triangle legs 3 and 4. Hypotenuse?',5,[6,7,12]],['Sides 5,5,8 form what type?','isosceles',['equilateral','scalene','right']],['Circle radius 5 circumference?','10pi',['5pi','25pi','50pi']],['Circle radius 3 area?','9pi',['3pi','6pi','18pi']],['Slope through (1,2) and (3,8)?',3,[2,4,6]],['Distance from (0,0) to (6,8)?',10,[8,12,14]],['90-degree sector is what fraction?','1/4',['1/2','1/3','1/6']],['Midpoint of (2,4) and (8,10)?','(5,7)',['(6,7)','(5,6)','(10,14)']]],
'Sentence Correction':[['Correct sentence:','The list of reasons is long.',['The list of reasons are long.','The list of reasons were long.','The list of reasons have long.']],['Each of the reports ___ accurate.','is',['are','were','have been']],['The company revised ___ policy.','its',['their',"they're",'them']],['Correct sentence:','Neither option is ideal.',['Neither option are ideal.','Neither options is ideal.','Neither options are ideal.']],['Clear modifier:','Walking to work, Maya found a wallet.',['Walking to work, a wallet was found by Maya.','A wallet walking to work was found by Maya.','Maya found a wallet, walking to work by itself.']],['Parallel phrase:','to plan, to test, and to launch',['to plan, testing, and launch','planning, to test, and launch','to plan, test, and launching']],['Correct comparison:','The new model is faster than the old model.',['The new model is faster than last year.','The new model is faster than using the old model.','The new model is faster than the old one does.']],['Parallel list:','writing, editing, and presenting',['writing, editing, and to present','to write, editing, and presenting','writing, to edit, and presentation']],['Correct verb: A group of investors ___ meeting today.','is',['are','have','were']],['Correct sentence:','The number of applicants has risen.',['The number of applicants have risen.','A number of applicants has risen.','The applicants has risen.']]],
'Critical Reasoning':[['Sales rose after ads, so ads caused it. Assumption?','No other major factor caused the sales increase.',['The campaign was expensive.','Sales always rise after ads.','The product is unpopular.']],['Cafe should extend hours because offices close late. Assumption?','Late workers would buy from the cafe.',['The cafe has no employees.','Offices dislike coffee.','Rent will decrease.']],['New lighting reduced accidents. Strengthen?','Accidents fell only on streets where lighting was installed.',['The lights are attractive.','Street names changed.','Accidents are unpleasant.']],['Price cut increased revenue. Strengthen?','Unit sales rose enough to offset the lower price.',['The store painted walls.','Prices are printed on tags.','Some goods were red.']],['Training improves productivity because errors fall. Assumption?','Error reduction meaningfully improves productivity.',['Training is fun.','Employees never quit.','Errors are impossible.']],['Reminder email improved attendance. Strengthen?','Recipients attended at a higher rate than similar non-recipients.',['The email had a subject line.','Attendance is counted.','Some people read fast.']],['Hire support agents to reduce wait. Assumption?','Agent availability is a bottleneck in wait times.',['Wait times are desirable.','Customers never call.','All agents are managers.']],['Vaccine reduced infections. Strengthen?','Comparable vaccinated people had lower infection rates.',['Needles are small.','Clinics opened at noon.','The vaccine had a label.']],['Lower prices to increase profit. Assumption?','Extra volume will more than offset lower margin.',['Customers like high prices.','Costs are zero.','Competitors close.']],['Podcast ads should work because target audience listens. Assumption?','Podcast ads can persuade that audience to visit.',['Museums have no visitors.','Podcasts are printed.','Audience dislikes museums.']]],
'Reading Comprehension':[['Remote work passage covers benefits and coordination costs. Main idea?','Remote work has advantages but creates management challenges.',['Remote work is always harmful.','Coordination costs are unrelated.','Offices are no longer used.']],['Coral reefs support biodiversity and warming threatens them. Main idea?','Coral reefs are important and increasingly threatened.',['Oceans have no wildlife.','Warming only helps reefs.','Biodiversity is minor.']],['Species survives only in cold streams; streams are warming. Infer?','The species may face habitat pressure.',['Species prefers deserts.','All streams are cold.','Warming has no effect.']],['Policy saved money in cities but not rural towns. Infer?','Effectiveness may depend on local conditions.',['Policy always saves money.','Rural towns are larger.','Cities never need policy.']],['Useful but incomplete theory means author sees it as?','Valuable but not sufficient.',['Fully accepted.','Worthless.','Never evaluated.']],['Product sells well despite poor reviews. Infer?','Factors besides reviews may influence sales.',['Reviews determine all sales.','The product has no buyers.','Sales data are missing.']],['Automation passage: productivity and labor disruption. Main idea?','Automation can increase efficiency while changing employment patterns.',['Automation has no effect.','Labor markets are absent.','Productivity always falls.']],['Renewables grow while grids face reliability issues. Main idea?','Renewables are expanding while grid systems must adapt.',['Renewables are impossible.','Grids do not matter.','Energy demand is absent.']],['Method is faster but less precise. Infer?','Use it when speed matters more than exactness.',['It is slow and precise.','No tradeoff exists.','Speed is irrelevant.']],['Profits rose while revenue stayed flat. Infer?','Costs may have fallen.',['Costs must rise.','Revenue doubled.','Profits cannot change.']]],

const $=id=>document.getElementById(id),book=()=>books[s.b],concept=()=>concepts[book()][s.c],diff=i=>i<3?'Easy':i<7?'Medium':'Hard',pct=()=>Math.round((s.score-MIN)/(MAX-MIN)*100),avg=()=>s.answered?Math.round(s.total/s.answered)+'s':'--';
function makeQ(){return templates[book()].map((x,i)=>({p:x[0],a:String(x[1]),choices:[String(x[1]),...x[2].map(String)].sort(()=>Math.random()-.5),why:'Review the core rule, eliminate traps, and keep units or grammar relationships explicit.',d:diff(i),i}))}
function stop(){clearInterval(s.timer);s.timer=null}function tick(){document.querySelectorAll('[data-t]').forEach(e=>e.textContent=Math.max(0,s.time)+'s');let bar=document.querySelector('[data-bar]');if(bar)bar.style.width=Math.max(0,s.time/LIMIT*100)+'%'}
function startTimer(){stop();s.time=LIMIT;s.start=Date.now();s.timer=setInterval(()=>{s.time--;tick();if(s.time<=0)answer(-1,true)},1000)}
function choose(){let qs=makeQ().filter(x=>!s.used.includes(x.i));if(!qs.length){s.phase='review';return render()}s.q=qs[0];s.sel=null;s.fb=null;s.phase='quiz';render();startTimer()}
function answer(i,timeout=false){if(s.sel!==null)return;stop();let choice=s.q.choices[i],ok=!timeout&&choice===s.q.a,move=delta[s.q.d][ok?0:1]-(timeout?2:0),spent=timeout?LIMIT:Math.max(1,Math.round((Date.now()-s.start)/1000));s.sel=timeout?'timeout':choice;s.last=move;s.score=Math.max(MIN,Math.min(MAX,s.score+move));s.answered++;s.total+=spent;if(ok){s.correct++;s.streak++}else s.streak=0;s.used.push(s.q.i);s.fb={ok,title:ok?'Correct: +'+move:(timeout?'Time expired: ':'Streak reset: ')+move,text:(ok?'Nice. ':'Correct answer: '+s.q.a+'. ')+s.q.why};if(s.streak>=PASS)setTimeout(()=>{s.phase='complete';render()},650);else render()}
function nextConcept(){stop();s.streak=0;s.used=[];s.sel=null;s.fb=null;s.q=null;s.time=LIMIT;if(s.c<concepts[book()].length-1)s.c++;else{s.booksDone++;if(s.b<books.length-1){s.b++;s.c=0}else{s.phase='done';return render()}}s.phase='lesson';render()}
function resetConcept(){stop();s.used=[];s.streak=0;s.phase='lesson';s.time=LIMIT;render()}function restart(){stop();s={b:0,c:0,score:100,phase:'lesson',streak:0,used:[],q:null,sel:null,fb:null,time:LIMIT,timer:null,start:0,total:0,answered:0,correct:0,booksDone:0,last:0};render()}
function header(){return `<section class="sticky top-0 z-20 border-b bg-white/95 px-4 py-3 shadow-sm backdrop-blur"><div class="mx-auto max-w-5xl"><div class="flex items-center justify-between gap-3"><div class="flex min-w-0 items-center gap-3"><img src="${LOGO}" alt="GMAT Avenger logo" class="h-12 w-12 rounded-lg object-contain shadow-sm"><div><p class="text-xs font-black uppercase tracking-[.18em] text-emerald-700">GMAT Avenger</p><h1 class="text-xl font-black text-slate-950">Score ${s.score}</h1></div></div><button onclick="restart()" class="tap h-10 w-10 rounded-lg border bg-white font-black">↻</button></div><div class="mt-3 grid grid-cols-2 gap-2 text-sm lg:grid-cols-4"><div class="rounded-lg border bg-slate-50 p-3"><p class="text-xs font-bold uppercase text-slate-500">Level</p><p class="font-bold">${s.b+1}. ${book()}</p></div><div class="rounded-lg border bg-slate-50 p-3"><p class="text-xs font-bold uppercase text-slate-500">Concept</p><p class="truncate font-bold">${concept()}</p></div><div class="rounded-lg border bg-slate-50 p-3"><p class="text-xs font-bold uppercase text-slate-500">Timer</p><p data-t class="font-bold">${s.time}s</p></div><div class="rounded-lg border bg-slate-50 p-3"><p class="text-xs font-bold uppercase text-slate-500">Avg / question</p><p class="font-bold">${avg()}</p></div></div><div class="mt-3 space-y-2"><p class="flex justify-between text-xs font-bold"><span>Score progress</span><span>${pct()}%</span></p><div class="h-3 rounded-full bg-slate-200"><div class="h-3 rounded-full bg-emerald-600" style="width:${pct()}%"></div></div><p class="flex justify-between text-xs font-bold"><span>10 on the trot</span><span>${s.streak}/${PASS}</span></p><div class="h-3 rounded-full bg-slate-200"><div class="h-3 rounded-full bg-amber-500" style="width:${s.streak/PASS*100}%"></div></div></div></div></section>`}
function rail(){return `<section class="px-4 pt-4"><div class="rail flex gap-2 overflow-x-auto pb-1">${books.map((b,i)=>`<div class="min-w-[8rem] rounded-lg border px-3 py-2 text-sm font-bold shadow-sm ${i===s.b?'bg-emerald-600 text-white':i<s.b?'bg-emerald-50 text-emerald-800':'bg-white text-slate-400'}">${i<s.b?'✓':i===s.b?'🎯':'🔒'} ${i+1}. ${b}</div>`).join('')}</div></section>`}
function lesson(){return `<section class="px-4 py-4"><div class="rounded-lg border bg-white p-5 shadow-sm"><span class="rounded-lg bg-slate-100 px-3 py-2 text-sm font-bold">Lesson</span><h2 class="mt-4 text-2xl font-black">${concept()}</h2><p class="mt-3 leading-7 text-slate-700">${lessons[book()]}</p><div class="mt-5 rounded-lg border border-emerald-100 bg-emerald-50 p-4 text-sm text-emerald-900"><b>Pass condition:</b> answer 10 questions correctly in a row. Questions run easy → medium → hard, and every timed answer adjusts your projected score.</div><button onclick="choose()" class="tap mt-5 w-full rounded-lg bg-slate-950 px-4 py-4 font-black text-white sm:w-auto">Start questions →</button></div></section>`}
function quiz(){let q=s.q;return `<section class="px-4 py-4"><div class="rounded-lg border bg-white p-5 shadow-sm"><div class="flex items-center justify-between"><b>Question ${s.used.length+(s.sel?0:1)} of 10</b><span class="text-sm font-bold text-slate-500">${10-s.used.length} left</span></div><div class="my-4 grid grid-cols-3 gap-2 text-sm"><div class="rounded-lg border bg-slate-50 p-3"><p class="text-xs font-bold uppercase text-slate-500">Difficulty</p><b>${q.d}</b></div><div class="rounded-lg border bg-slate-50 p-3"><p class="text-xs font-bold uppercase text-slate-500">Time</p><b data-t>${s.time}s</b></div><div class="rounded-lg border bg-slate-50 p-3"><p class="text-xs font-bold uppercase text-slate-500">Move</p><b class="${s.last>=0?'text-emerald-700':'text-rose-700'}">${s.last>0?'+':''}${s.last}</b></div></div><div class="mb-5 h-2 rounded-full bg-slate-200"><div data-bar class="h-2 rounded-full bg-blue-600" style="width:${s.time/LIMIT*100}%"></div></div><h2 class="text-xl font-black leading-8">${q.p}</h2><div class="mt-5 grid gap-3">${q.choices.map((c,i)=>{let cls='border-slate-200 bg-white';if(s.sel&&c===q.a)cls='border-emerald-400 bg-emerald-50';if(s.sel===c&&c!==q.a)cls='border-rose-400 bg-rose-50';return `<button ${s.sel?'disabled':''} onclick="answer(${i})" class="choice tap min-h-14 rounded-lg border px-4 py-3 text-left font-bold shadow-sm ${cls}">${c}</button>`}).join('')}</div>${s.fb?`<div class="mt-5 rounded-lg border p-4 ${s.fb.ok?'border-emerald-200 bg-emerald-50 text-emerald-900':'border-rose-200 bg-rose-50 text-rose-900'}"><b>${s.fb.title}</b><p class="mt-2 text-sm leading-6">${s.fb.text}</p></div>${s.streak<PASS?'<button onclick="choose()" class="tap mt-5 w-full rounded-lg bg-slate-950 px-4 py-4 font-black text-white sm:w-auto">Next question →</button>':''}`:''}</div></section>`}
function review(){return `<section class="px-4 py-4"><div class="rounded-lg border border-amber-200 bg-amber-50 p-5"><h2 class="text-2xl font-black">Review needed</h2><p class="mt-3 leading-7">You exhausted the ladder without 10 correct in a row. Review and retry this concept.</p><button onclick="resetConcept()" class="tap mt-5 w-full rounded-lg bg-slate-950 px-4 py-4 font-black text-white sm:w-auto">Review lesson</button></div></section>`}
function complete(){return `<section class="px-4 py-4"><div class="rounded-lg border border-emerald-200 bg-emerald-50 p-5"><h2 class="text-2xl font-black">That is 10 on the trot.</h2><p class="mt-3 leading-7">Concept mastered. Your projected score has already moved question by question.</p><button onclick="nextConcept()" class="tap mt-5 w-full rounded-lg bg-emerald-700 px-4 py-4 font-black text-white sm:w-auto">Continue →</button></div></section>`}
function done(){return `<section class="px-4 py-4"><div class="rounded-lg border bg-white p-6"><h2 class="text-3xl font-black">Projected score: ${s.score}</h2><p class="mt-3 leading-7">You cleared every GMAT Avenger level.</p><button onclick="restart()" class="tap mt-5 rounded-lg bg-slate-950 px-4 py-4 font-black text-white">Restart sprint</button></div></section>`}
function stats(){return `<section class="px-4 pb-4"><div class="grid grid-cols-3 gap-2 text-center"><div class="rounded-lg border bg-white p-3"><p class="text-xs font-bold text-slate-500">Books</p><b>${s.booksDone}/8</b></div><div class="rounded-lg border bg-white p-3"><p class="text-xs font-bold text-slate-500">Correct</p><b>${s.correct}</b></div><div class="rounded-lg border bg-white p-3"><p class="text-xs font-bold text-slate-500">Accuracy</p><b>${s.answered?Math.round(s.correct/s.answered*100):0}%</b></div></div></section>`}
function render(){let body=s.phase==='lesson'?lesson():s.phase==='quiz'?quiz():s.phase==='review'?review():s.phase==='complete'?complete():done();$('app').innerHTML=header()+rail()+stats()+body}render();
</script>
</body>
</html>
