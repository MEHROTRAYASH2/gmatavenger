<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GMAT Avenger</title>
  <meta name="description" content="AI-personalized GMAT Focus Edition prep with daily plans, adaptive drills, custom mocks, analytics, and readiness forecasting.">
  <link rel="canonical" href="https://GMATAvenger.com/">
  <meta property="og:title" content="GMAT Avenger">
  <meta property="og:description" content="GMAT Prep powered by AI, success by you.">
  <meta property="og:url" content="https://GMATAvenger.com/">
  <meta property="og:type" content="website">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body{margin:0;background:radial-gradient(circle at 10% -6%,#d6f3ed 0,transparent 32rem),radial-gradient(circle at 95% 0,#f7e8bd 0,transparent 28rem),linear-gradient(#fbfdfc,#eef5f2);color:#12222b;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.tap{-webkit-tap-highlight-color:transparent}.choice:disabled{opacity:1}.scroll::-webkit-scrollbar{display:none}.scroll{scrollbar-width:none}.cell{min-height:5.5rem}
  </style>
</head>
<body class="min-h-screen">
<main id="app" class="min-h-screen"></main>
<script>
const $=id=>document.getElementById(id),clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const logo=()=>`<svg viewBox="0 0 84 84" class="h-11 w-11 shrink-0 rounded-lg shadow-sm" role="img" aria-label="GMAT Avenger logo"><defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#10233f"/><stop offset="1" stop-color="#0f766e"/></linearGradient></defs><path d="M42 5l28 12v20c0 18-12 32-28 42-16-10-28-24-28-42V17z" fill="url(#g)"/><path d="M42 13l20 9v15c0 13-8 24-20 32-12-8-20-19-20-32V22z" fill="none" stroke="#d5a84a" stroke-width="4"/><path d="M20 62L64 18l-4 18 18-4-44 44 5-19z" fill="#d5a84a" stroke="#10233f" stroke-width="3"/><path d="M42 28l4 9 10 1-8 6 3 10-9-5-9 5 3-10-8-6 10-1z" fill="#fff2c4"/></svg>`;
const S={view:"landing",nav:"dashboard",step:1,target:715,score:615,exam:"2026-09-15",week:1.5,weekend:3,base:"score",streak:7,q:0,sel:null,run:false,correct:0,answered:0,total:0,timer:null,left:90,started:0,trot:0,file:"",gen:false};
const weak=[
["Quant","Number Properties",45,-8,"Accuracy dropped below 55% on divisibility and LCM traps."],
["Quant","Rates / Work",58,4,"Setup is improving, but combined rates are still slow."],
["Verbal","CR Assumption",41,-11,"Three of the last five misses were necessary-assumption traps."],
["Verbal","RC Inference",67,5,"Better support tracking; still watch answer overreach."],
["DI","Multi-Source Reasoning",38,-14,"Table-linking misses and high time spent keep recurring."],
["DI","Two-Part Analysis",72,9,"Strong medium accuracy; ready for harder items."]
];
const tasks=[
["Concept","Number Properties","Quant","Prime factors, LCM/GCF, remainder traps",30,45,"Scheduled because it blocks algebra and DI table arithmetic."],
["Weak Area Drill","Multi-Source Reasoning","DI","3-tab source linking and contradiction checks",40,38,"Scheduled because your DI accuracy fell below 60% this week."],
["Review","CR Assumption Error Log","Verbal","Negation test and alternate-cause misses",20,41,"Scheduled because assumption traps caused your plateau."]
];
const questions=[
["Quant",505,"If n is divisible by both 12 and 18, which must n be divisible by?",["24","30","36","48","72"],"36","LCM(12,18)=36. Any such n must contain 2^2 and 3^2."],
["Quant",555,"A value rises from 80 to 100. What is the percent increase?",["20%","25%","40%","80%","125%"],"25%","The increase is 20 on a base of 80, so 20/80=25%."],
["Verbal",575,"The number of applicants ___ risen sharply.",["have","has","are","were","being"],"has","The subject is singular: number. The plural applicants is inside a prepositional phrase."],
["DI",595,"Traffic fell from 10,000 to 7,000 while conversion rose from 4% to 5%. What happened to conversions?",["Increased 25%","Stayed the same","Decreased 12.5%","Decreased 30%","Cannot be determined"],"Decreased 12.5%","Old conversions: 400. New conversions: 350. Drop is 50/400=12.5%."],
["CR",615,"Revenue rose after a homepage redesign. Therefore the redesign caused it. Required assumption?",["The redesign was cheap","No other major factor caused the increase","Competitors redesigned too","Revenue rose slowly","The firm hired designers"],"No other major factor caused the increase","The causal claim needs major alternate causes ruled out."],
["RC",635,"A passage says automation raises productivity but disrupts labor markets. Main idea?",["Automation has no effect","Automation can improve efficiency while changing employment","Labor markets are irrelevant","Productivity always falls","Automation ends all jobs"],"Automation can improve efficiency while changing employment","The balanced answer captures both benefit and disruption."],
["Quant",655,"A worker finishes 1/6 of a job per hour. Another finishes 1/4 per hour. Together, their hourly rate is:",["1/10","1/5","5/12","7/12","2/5"],"5/12","Add rates: 1/6+1/4=2/12+3/12=5/12."],
["Verbal",675,"Choose the parallel version.",["to plan, testing, and launch","planning, to test, and launch","to plan, to test, and to launch","to plan, editing, and to launch","planning, test, launch"],"to plan, to test, and to launch","The three list elements have the same infinitive structure."],
["DI",685,"A 90-degree sector of a circle represents what percent of the circle?",["10%","20%","25%","50%","90%"],"25%","90 degrees is one quarter of 360 degrees."],
["CR",695,"A cafe should extend hours because nearby offices close late. Required assumption?",["The cafe has no employees","Late workers would buy from the cafe","Rent will fall","Offices dislike coffee","The cafe is new"],"Late workers would buy from the cafe","Late office hours matter only if those workers become customers."],
["Quant",705,"How many positive factors does 72 have?",["8","10","12","14","18"],"12","72=2^3*3^2, so factors=(3+1)(2+1)=12."],
["RC",715,"A method is faster but less precise. Best inference?",["It is useless","It should be used when speed matters more than exactness","It is always best","It is slow and precise","No tradeoff exists"],"It should be used when speed matters more than exactness","The passage gives a tradeoff, not an absolute judgment."],
["DI",725,"Profit is revenue minus cost. If revenue is 240 and margin is 25%, profit is:",["40","50","60","80","180"],"60","Profit margin is profit/revenue, so 25% of 240 is 60."],
["CR",735,"Training improved productivity because errors fell. Required assumption?",["Training is fun","Errors are impossible","Error reduction meaningfully improves productivity","Employees never quit","The firm sells software"],"Error reduction meaningfully improves productivity","The premise must connect fewer errors to higher productivity."],
["Quant",755,"Smallest positive integer divisible by 8, 12, and 18?",["24","36","48","72","144"],"72","LCM uses 2^3 and 3^2, so 8*9=72."]
];
const plans=[["Basic","₹0","Free forever",["1 target exam","Basic AI daily plan","2 sectional mocks/month","1 custom AI mock from notes"]],["Pro","₹2,999","Launch offer / year",["Unlimited daily adaptive plans","10 full Focus adaptive mocks","15 custom AI mocks/month","Detailed weak-area matrix"],1],["Elite","₹5,999","Per year",["Unlimited PDF custom mocks","Deep pacing analytics","Advanced score forecasting","Priority support"]]];
function days(){return Math.max(0,Math.ceil((new Date(S.exam+"T00:00:00")-new Date())/864e5))}
function ready(){return clamp(Math.round((S.score-205)/(S.target-205)*100),0,100)}
function avg(){return S.answered?Math.round(S.total/S.answered)+"s":"--"}
function go(v){S.view=v;render();scrollTo(0,0)} function nav(v){S.view="app";S.nav=v;render();scrollTo(0,0)}
function onboard(){S.view="onboard";S.step=1;render()} function next(){if(S.step<3){S.step++;render();return}S.view="plan";render();setTimeout(()=>{S.score=S.base==="diag"?585:Number(S.score);S.view="app";S.nav="dashboard";render()},1200)}
function field(k,v){S[k]=v;render()}
function start(){S.run=true;S.nav="practice";S.q=0;S.sel=null;S.correct=0;S.answered=0;S.total=0;S.trot=0;render();clock()}
function clock(){clearInterval(S.timer);S.left=90;S.started=Date.now();S.timer=setInterval(()=>{S.left--;let t=document.querySelector("[data-time]");if(t)t.textContent=S.left+"s";let b=document.querySelector("[data-tbar]");if(b)b.style.width=S.left/90*100+"%";if(S.left<=0)answer("__timeout")},1000)}
function answer(c){if(S.sel)return;clearInterval(S.timer);let q=questions[S.q],ok=c===q[4],hard=q[1]>=700,move=ok?(hard?12:8):(hard?-6:-10);if(c==="__timeout")move-=2;S.sel=c;S.score=clamp(S.score+move,205,805);S.answered++;S.total+=c==="__timeout"?90:Math.max(1,Math.round((Date.now()-S.started)/1000));S.trot=ok?S.trot+1:0;if(ok)S.correct++;S.last=move;render()}
function nextQ(){if(S.trot>=10){S.run=false;S.nav="analytics";render();return}if(S.q<questions.length-1){S.q++;S.sel=null;render();clock()}else{S.run=false;S.nav="analytics";render()}}
function upload(i){S.file=i.files&&i.files[0]?i.files[0].name:"";S.gen=!!S.file;render();if(S.file)setTimeout(()=>{S.gen=false;render()},1100)}
function header(){return `<header class="sticky top-0 z-30 border-b bg-white/95 backdrop-blur"><div class="mx-auto flex max-w-7xl items-center justify-between gap-3 px-4 py-3"><button onclick="go('landing')" class="tap flex items-center gap-3 text-left">${logo()}<span><b class="block uppercase tracking-[.18em] text-teal-700">GMAT Avenger</b><small class="font-semibold text-slate-500">AI Focus Edition prep</small></span></button><nav class="hidden gap-2 md:flex">${["Product","Dashboard","Analytics","Pricing"].map(x=>`<button onclick="${x==="Product"?"go('landing')":x==="Pricing"?"document.getElementById('pricing')?.scrollIntoView({behavior:'smooth'})":"nav('"+x.toLowerCase()+"')"}" class="rounded-lg px-3 py-2 text-sm font-bold text-slate-700">${x}</button>`).join("")}</nav><button onclick="onboard()" class="tap rounded-lg bg-slate-950 px-4 py-3 text-sm font-black text-white">Generate My Plan</button></div></header>`}
function landing(){return header()+`<section class="mx-auto grid max-w-7xl gap-8 px-4 py-8 lg:grid-cols-[1.05fr_.95fr] lg:items-center"><div><span class="rounded-lg border border-teal-200 bg-teal-50 px-3 py-2 text-sm font-bold text-teal-900">Daily AI roadmap for GMAT Focus Edition</span><h1 class="mt-5 max-w-4xl text-4xl font-black leading-tight sm:text-6xl">GMAT Prep powered by AI, success by you.</h1><p class="mt-5 max-w-2xl text-lg leading-8 text-slate-700">GMAT Avenger creates your daily study plan, targets your weak topics, and forecasts your Focus Edition score. Stop guessing, start improving.</p><div class="mt-6 flex flex-col gap-3 sm:flex-row"><button onclick="onboard()" class="tap rounded-lg bg-teal-700 px-5 py-4 font-black text-white">Generate My GMAT Study Plan</button><button onclick="nav('dashboard')" class="tap rounded-lg border bg-white px-5 py-4 font-black">View AI Dashboard</button></div><div class="scroll mt-6 flex gap-2 overflow-x-auto rounded-lg border bg-white p-3 text-sm font-bold"><span class="rounded-lg bg-emerald-50 px-3 py-2 text-emerald-800">7 day streak for Yash</span><span class="rounded-lg bg-amber-50 px-3 py-2 text-amber-800">685 to 715 projected</span><span class="rounded-lg bg-blue-50 px-3 py-2 text-blue-800">DI weakness found in 12 mins</span></div></div><div class="rounded-lg border bg-white p-5 shadow-xl">${readiness()}</div></section><section class="mx-auto grid max-w-7xl gap-4 px-4 py-6 md:grid-cols-3">${card("Endless syllabus","Quant, CR, RC, and DI feel impossible to sequence.","AI daily mapped plan")} ${card("Same mistakes","Generic mocks repeat the same blind spots without fixing them.","Error-log driven mocks")} ${card("Track anxiety","You do not know whether you are on pace for 705+.","Real-time score forecasting")}</section><section class="mx-auto grid max-w-7xl gap-4 px-4 py-6 lg:grid-cols-3">${feat("01","Know what to study today","Open GMAT Avenger and get a zero-guesswork session built from your deadline, target score, and weak-area matrix.")}${feat("02","Practice only weak topics","Adaptive drills assemble from recent mistakes, low-mastery topics, and pacing leaks.")}${feat("03","Upload custom material","Feed notes or PDFs into a mock generator that extracts concepts and creates timed practice.")}</section>${pricing()}`}
function card(a,b,c){return `<article class="rounded-lg border bg-white p-5 shadow-sm"><p class="text-sm font-black uppercase text-rose-700">${a}</p><p class="mt-3 text-slate-700">${b}</p><p class="mt-4 rounded-lg bg-teal-50 px-3 py-3 font-bold text-teal-900">${c}</p></article>`}
function feat(n,t,d){return `<article class="rounded-lg border bg-white p-5 shadow-sm"><span class="text-sm font-black text-slate-400">${n}</span><h2 class="mt-4 text-xl font-black">${t}</h2><p class="mt-3 leading-7 text-slate-700">${d}</p></article>`}
function pricing(){return `<section id="pricing" class="mx-auto max-w-7xl px-4 py-10"><p class="text-sm font-black uppercase text-teal-700">Pricing</p><h2 class="mt-1 text-3xl font-black">Start free. Upgrade when mocks matter.</h2><div class="mt-5 grid gap-4 lg:grid-cols-3">${plans.map(p=>`<article class="rounded-lg border ${p[4]?"border-teal-500 bg-teal-50":"bg-white"} p-5 shadow-sm"><h3 class="text-xl font-black">${p[0]}</h3><p class="mt-4 text-3xl font-black">${p[1]} <span class="text-sm text-slate-500">${p[2]}</span></p><ul class="mt-5 space-y-3">${p[3].map(x=>`<li class="text-sm font-semibold text-slate-700">&check; ${x}</li>`).join("")}</ul><button onclick="onboard()" class="tap mt-6 w-full rounded-lg bg-slate-950 px-4 py-3 font-black text-white">Choose ${p[0]}</button></article>`).join("")}</div></section>`}
function onboardView(){let body=S.step===1?`<h1 class="text-3xl font-black">Set your GMAT Focus goal.</h1><p class="mt-2 text-slate-700">GMAT Avenger uses your target score and date to size the daily workload.</p><div class="mt-6 grid gap-4 sm:grid-cols-2"><label class="rounded-lg border bg-slate-50 p-4"><b>Target score ${S.target}</b><input class="mt-4 w-full" type="range" min="505" max="805" step="10" value="${S.target}" oninput="field('target',Number(this.value))"></label><label class="rounded-lg border bg-slate-50 p-4"><b>Exam date</b><input class="mt-4 w-full rounded-lg border px-3 py-3" type="date" value="${S.exam}" onchange="field('exam',this.value)"><p class="mt-2 text-sm font-bold text-teal-700">${days()} days left</p></label></div>`:S.step===2?`<h1 class="text-3xl font-black">How many hours can you study?</h1><div class="mt-6 grid gap-4 sm:grid-cols-2"><label class="rounded-lg border bg-slate-50 p-4"><b>Weekdays ${S.week}h/day</b><input class="mt-4 w-full" type="range" min=".5" max="4" step=".5" value="${S.week}" oninput="field('week',Number(this.value))"></label><label class="rounded-lg border bg-slate-50 p-4"><b>Weekends ${S.weekend}h/day</b><input class="mt-4 w-full" type="range" min="1" max="8" step=".5" value="${S.weekend}" oninput="field('weekend',Number(this.value))"></label></div>`:`<h1 class="text-3xl font-black">Choose your baseline.</h1><p class="mt-2 text-slate-700">Use a previous official score or start with a 15-minute diagnostic AI mock.</p><div class="mt-6 grid gap-4 sm:grid-cols-2"><button onclick="field('base','score')" class="tap rounded-lg border p-4 text-left ${S.base==="score"?"border-teal-500 bg-teal-50":"bg-slate-50"}"><b>Enter previous score</b><input class="mt-4 w-full rounded-lg border px-3 py-3" type="number" value="${S.score}" onchange="field('score',Number(this.value))"></button><button onclick="field('base','diag')" class="tap rounded-lg border p-4 text-left ${S.base==="diag"?"border-teal-500 bg-teal-50":"bg-slate-50"}"><b>Take diagnostic mock</b><p class="mt-2 text-sm">15 mixed questions across Quant, Verbal, and DI.</p></button></div>`;return header()+`<section class="mx-auto max-w-4xl px-4 py-6"><div class="rounded-lg border bg-white p-5 shadow-sm"><div class="mb-6 grid grid-cols-3 gap-2">${["Goal","Time","Baseline"].map((x,i)=>`<div class="rounded-lg border p-3 text-center text-sm font-black ${S.step===i+1?"border-teal-500 bg-teal-50 text-teal-900":"bg-slate-50 text-slate-500"}">${i+1}. ${x}</div>`).join("")}</div>${body}<div class="mt-6 flex gap-3"><button onclick="S.step=Math.max(1,S.step-1);render()" class="tap rounded-lg border px-4 py-3 font-black">Back</button><button onclick="next()" class="tap flex-1 rounded-lg bg-teal-700 px-4 py-3 font-black text-white">${S.step===3?"Build My AI Roadmap":"Continue"}</button></div></div></section>`}
function planView(){return header()+`<section class="mx-auto max-w-3xl px-4 py-16 text-center"><div class="rounded-lg border bg-white p-8 shadow-sm">${logo()}<h1 class="mt-6 text-3xl font-black">Building your personalized GMAT roadmap...</h1><div class="mt-6 space-y-3 text-left">${["Mapping syllabus","Identifying weak areas","Generating daily timetable"].map((x,i)=>`<p class="rounded-lg bg-teal-50 px-4 py-3 font-bold text-teal-900">&check; ${x}</p>`).join("")}</div></div></section>`}
function app(){return `<div class="min-h-screen lg:grid lg:grid-cols-[17rem_1fr]">${side()}<div>${mobile()}<main class="mx-auto max-w-7xl px-4 py-5">${S.nav==="dashboard"?dash():S.nav==="practice"?practice():S.nav==="custom"?custom():S.nav==="analytics"?analytics():settings()}</main></div></div>`}
function side(){return `<aside class="hidden border-r bg-white p-5 lg:block"><button onclick="go('landing')" class="flex items-center gap-3 text-left">${logo()}<span><b>GMAT Avenger</b><small class="block text-slate-500">Focus Edition AI</small></span></button><nav class="mt-8 space-y-2">${[["dashboard","Dashboard"],["practice","Full Mocks"],["custom","Custom Mocks"],["analytics","Analytics"],["settings","Settings"]].map(x=>`<button onclick="nav('${x[0]}')" class="tap w-full rounded-lg px-3 py-3 text-left font-bold ${S.nav===x[0]?"bg-teal-700 text-white":"hover:bg-slate-100"}">${x[1]}</button>`).join("")}</nav></aside>`}
function mobile(){return `<header class="sticky top-0 z-30 border-b bg-white/95 p-3 backdrop-blur lg:hidden"><div class="flex items-center justify-between">${logo()}<b>${S.streak} day streak</b></div><nav class="scroll mt-3 flex gap-2 overflow-x-auto">${["dashboard","practice","custom","analytics","settings"].map(x=>`<button onclick="nav('${x}')" class="tap shrink-0 rounded-lg px-3 py-2 text-sm font-bold ${S.nav===x?"bg-teal-700 text-white":"bg-slate-100"}">${x}</button>`).join("")}</nav></header>`}
function dash(){return `<section class="grid gap-4 xl:grid-cols-[1fr_22rem]"><div class="space-y-4">${ribbon()}${readiness()}${todayPlan()}</div><div class="space-y-4">${mockCard()}${radar()}</div></section>`}
function ribbon(){return `<div class="grid gap-3 sm:grid-cols-3">${[["Countdown","Day 12",days()+" days to exam"],["Daily streak",S.streak+" days","Plan completion 86%"],["Today's time",S.week+"h","Optimized session"]].map(x=>`<div class="rounded-lg border bg-white p-4 shadow-sm"><p class="text-xs font-black uppercase text-slate-500">${x[0]}</p><p class="mt-1 text-2xl font-black">${x[1]}</p><p class="text-sm font-bold text-slate-600">${x[2]}</p></div>`).join("")}</div>`}
function readiness(){return `<article class="rounded-lg border bg-white p-5 shadow-sm"><p class="text-sm font-black uppercase text-teal-700">Readiness tracker</p><div class="mt-2 flex items-center justify-between"><h2 class="text-3xl font-black">${S.score} <span class="text-base text-slate-500">current</span></h2><div class="rounded-lg bg-slate-950 px-4 py-3 text-white"><small>Target</small><p class="text-2xl font-black">${S.target}</p></div></div><div class="mt-5"><div class="mb-2 flex justify-between text-sm font-bold"><span>Projected trajectory</span><span>${ready()}%</span></div><div class="h-4 rounded-full bg-slate-200"><div class="h-4 rounded-full bg-teal-700" style="width:${ready()}%"></div></div></div><div class="mt-5 grid grid-cols-3 gap-2 text-center"><div class="rounded-lg bg-teal-50 p-3"><b>61%</b><p class="text-xs">Quant</p></div><div class="rounded-lg bg-rose-50 p-3"><b>54%</b><p class="text-xs">Verbal</p></div><div class="rounded-lg bg-amber-50 p-3"><b>49%</b><p class="text-xs">DI</p></div></div></article>`}
function todayPlan(){return `<article class="rounded-lg border bg-white p-5 shadow-sm"><div class="flex items-center justify-between gap-3"><div><p class="text-sm font-black uppercase text-teal-700">Today's AI plan</p><h2 class="text-2xl font-black">Exactly what to do next</h2></div><button onclick="start()" class="tap rounded-lg bg-slate-950 px-4 py-3 text-sm font-black text-white">Start drill</button></div><div class="mt-5 space-y-3">${tasks.map((t,i)=>`<div class="rounded-lg border bg-slate-50 p-4"><p class="text-xs font-black uppercase text-slate-500">Task ${i+1} · ${t[0]} · ${t[2]}</p><div class="mt-1 flex justify-between gap-3"><h3 class="text-xl font-black">${t[1]}</h3><b>${t[4]} mins</b></div><p class="mt-1 text-sm text-slate-600">${t[3]}</p><div class="mt-3 h-2 rounded-full bg-slate-200"><div class="h-2 rounded-full ${t[5]<50?"bg-rose-500":"bg-amber-500"}" style="width:${t[5]}%"></div></div><p class="mt-2 text-sm text-slate-600">${t[6]}</p></div>`).join("")}</div></article>`}
function mockCard(){return `<article class="rounded-lg border bg-slate-950 p-5 text-white shadow-sm"><p class="text-sm font-black uppercase text-teal-200">Daily adaptive mock</p><h2 class="mt-2 text-2xl font-black">15-question mini drill</h2><p class="mt-3 text-slate-300">Assembled from your last mistakes, weak topics, and pacing risk.</p><div class="mt-4 grid grid-cols-3 gap-2 text-center text-sm">${["Quant","Verbal","DI"].map(x=>`<div class="rounded-lg bg-white/10 p-3"><b>5</b><p>${x}</p></div>`).join("")}</div><button onclick="start()" class="tap mt-5 w-full rounded-lg bg-teal-500 px-4 py-4 font-black text-slate-950">Start 15-min Drill</button></article>`}
function radar(){return `<article class="rounded-lg border bg-white p-5 shadow-sm"><p class="text-sm font-black uppercase text-teal-700">Weak-area radar</p><div class="mt-4 space-y-3">${weak.slice(0,4).map(w=>`<div><div class="mb-1 flex justify-between text-sm font-bold"><span>${w[1]}</span><span>${w[2]}%</span></div><div class="h-2 rounded-full bg-slate-200"><div class="h-2 rounded-full ${w[2]<50?"bg-rose-500":w[2]<70?"bg-amber-500":"bg-emerald-500"}" style="width:${w[2]}%"></div></div></div>`).join("")}</div></article>`}
function practice(){if(!S.run)return `<section class="grid gap-4 lg:grid-cols-[1fr_22rem]"><article class="rounded-lg border bg-white shadow-sm"><div class="rounded-t-lg bg-teal-800 px-5 py-4 text-white"><p class="text-sm font-black uppercase text-teal-100">GMAT Focus-style interface</p><h1 class="text-2xl font-black">Adaptive Practice Engine</h1></div><div class="p-5"><div class="grid gap-4 sm:grid-cols-3">${["Quant","Verbal","Data Insights"].map((x,i)=>`<button onclick="start()" class="tap rounded-lg border bg-slate-50 p-4 text-left hover:border-teal-500"><p class="text-xs font-black uppercase text-slate-500">Section ${i+1}</p><h2 class="text-xl font-black">${x}</h2><p class="mt-2 text-sm text-slate-600">Adaptive difficulty from ${605+i*40} level items.</p></button>`).join("")}</div><button onclick="start()" class="tap mt-5 rounded-lg bg-teal-700 px-5 py-4 font-black text-white">Launch adaptive set</button></div></article>${mockCard()}</section>`;let q=questions[S.q],ok=S.sel===q[4];return `<section class="overflow-hidden rounded-lg border bg-white shadow-sm"><div class="flex items-center justify-between bg-teal-800 px-4 py-3 text-white"><div><p class="text-xs font-black uppercase text-teal-100">${q[0]} · Difficulty ${q[1]}</p><h1 class="font-black">Question ${S.q+1} of 15</h1></div><div class="text-right"><b data-time>${S.left}s</b><p class="text-xs">Avg/Q ${avg()}</p></div></div><div class="h-2 bg-slate-200"><div data-tbar class="h-2 bg-amber-400" style="width:${S.left/90*100}%"></div></div><div class="grid lg:grid-cols-[1fr_20rem]"><div class="p-5"><div class="mb-4 grid grid-cols-3 gap-2 text-center text-sm"><div class="rounded-lg bg-slate-100 p-2"><b>Score ${S.score}</b></div><div class="rounded-lg bg-slate-100 p-2"><b>10 on Trot ${S.trot}/10</b></div><div class="rounded-lg bg-slate-100 p-2"><b>${S.last?S.last>0?"+"+S.last:S.last:"0"} last</b></div></div><h2 class="text-xl font-black leading-8">${q[2]}</h2><div class="mt-5 space-y-3">${q[3].map(c=>{let cls="border-slate-200 bg-white";if(S.sel&&c===q[4])cls="border-emerald-500 bg-emerald-50";if(S.sel===c&&c!==q[4])cls="border-rose-500 bg-rose-50";return `<button ${S.sel?"disabled":""} onclick="answer('${c.replace(/'/g,"\\'")}')" class="choice tap w-full rounded-lg border px-4 py-3 text-left font-bold ${cls}">${c}</button>`}).join("")}</div>${S.sel?`<div class="mt-5 rounded-lg border ${ok?"border-emerald-200 bg-emerald-50 text-emerald-900":"border-rose-200 bg-rose-50 text-rose-900"} p-4"><h3 class="font-black">${ok?"Correct":"Review this miss"}</h3><p class="mt-2">${q[5]}</p></div><button onclick="nextQ()" class="tap mt-5 rounded-lg bg-slate-950 px-5 py-4 font-black text-white">${S.trot>=10?"Review analytics":S.q===14?"Review lesson and rebuild set":"Next question"}</button>`:""}</div><aside class="border-t bg-slate-50 p-5 lg:border-l lg:border-t-0"><p class="text-sm font-black uppercase text-slate-500">AI explanation model</p><p class="mt-4 text-sm leading-6"><b>Trap analysis:</b> every wrong option is tagged by misconception.</p><p class="mt-3 text-sm leading-6"><b>Next difficulty:</b> adjusted using accuracy, pacing, and topic confidence.</p></aside></div></section>`}
function custom(){return `<section class="grid gap-4 lg:grid-cols-[1fr_22rem]"><article class="rounded-lg border bg-white p-5 shadow-sm"><p class="text-sm font-black uppercase text-teal-700">Custom AI mock generator</p><h1 class="mt-1 text-3xl font-black">Upload notes. Generate a timed mock.</h1><label class="mt-6 block rounded-lg border-2 border-dashed bg-slate-50 p-6 text-center"><b>Upload GMAT Club PDFs, notes, or question sets</b><input type="file" accept=".pdf,.txt,.doc,.docx" onchange="upload(this)" class="mt-4 w-full rounded-lg border bg-white px-3 py-3"></label>${S.file?`<div class="mt-5 rounded-lg border border-teal-200 bg-teal-50 p-4"><p class="font-black text-teal-900">${S.gen?"Parsing material...":"Mock blueprint ready"}</p><p class="mt-2 text-sm">${S.file}</p>${S.gen?`<div class="mt-3 h-2 rounded-full bg-white"><div class="h-2 w-2/3 rounded-full bg-teal-700"></div></div>`:`<button onclick="start()" class="tap mt-3 rounded-lg bg-teal-700 px-4 py-3 font-black text-white">Start generated mock</button>`}</div>`:""}</article><article class="rounded-lg border bg-white p-5 shadow-sm"><p class="text-sm font-black uppercase text-slate-500">Topic selector</p><div class="mt-4 flex flex-wrap gap-2">${["Combinatorics","Bold Face CR","RC Inference","Two-Part Analysis","Rates / Work","MSR"].map(x=>`<span class="rounded-lg bg-slate-100 px-3 py-2 text-sm font-bold">${x}</span>`).join("")}</div><p class="mt-5 text-sm text-slate-600">Generated mocks use section, topic, sub-topic, difficulty, and expected solve-time tags.</p></article></section>`}
function analytics(){return `<section class="space-y-4"><div class="grid gap-4 lg:grid-cols-[1fr_22rem]"><article class="rounded-lg border bg-white p-5 shadow-sm"><p class="text-sm font-black uppercase text-teal-700">Mastery matrix</p><h1 class="mt-1 text-3xl font-black">Actionable weak-area heatmap</h1><div class="mt-5 grid gap-3 sm:grid-cols-2 lg:grid-cols-3">${weak.map(w=>`<div class="cell rounded-lg border bg-slate-50 p-4"><div class="flex justify-between gap-2"><div><p class="text-xs font-black uppercase text-slate-500">${w[0]}</p><h3 class="font-black">${w[1]}</h3></div><span class="rounded-lg px-2 py-1 text-xs font-black text-white ${w[2]<50?"bg-rose-500":w[2]<70?"bg-amber-500":"bg-emerald-500"}">${w[2]}%</span></div><p class="mt-3 text-sm text-slate-600">${w[4]}</p></div>`).join("")}</div></article><article class="rounded-lg border bg-white p-5 shadow-sm"><p class="text-sm font-black uppercase text-teal-700">Pacing analytics</p><div class="mt-4 space-y-4"><div class="rounded-lg bg-rose-50 p-4"><p class="font-black text-rose-900">Time-sink alert</p><p class="mt-2 text-sm">You spend 3.5 mins on DI misses. Skip decision should happen by 2:10.</p></div><div class="rounded-lg bg-amber-50 p-4"><p class="font-black text-amber-900">CR pacing</p><p class="mt-2 text-sm">Assumption accuracy drops after 2:00.</p></div></div></article></div><article class="rounded-lg border bg-white p-5 shadow-sm"><p class="text-sm font-black uppercase text-teal-700">Algorithm transparency</p><div class="mt-4 grid gap-3 md:grid-cols-3">${tasks.map(t=>`<div class="rounded-lg bg-slate-50 p-4"><p class="font-black">${t[1]}</p><p class="mt-2 text-sm text-slate-600">${t[6]}</p></div>`).join("")}</div></article></section>`}
function settings(){return `<section class="rounded-lg border bg-white p-5 shadow-sm"><p class="text-sm font-black uppercase text-teal-700">Settings</p><h1 class="mt-1 text-3xl font-black">Goal and plan controls</h1><div class="mt-6 grid gap-4 sm:grid-cols-2"><label class="rounded-lg border bg-slate-50 p-4"><b>Target score ${S.target}</b><input class="mt-4 w-full" type="range" min="505" max="805" step="10" value="${S.target}" oninput="field('target',Number(this.value))"></label><label class="rounded-lg border bg-slate-50 p-4"><b>Exam date</b><input class="mt-4 w-full rounded-lg border px-3 py-3" type="date" value="${S.exam}" onchange="field('exam',this.value)"></label></div></section>`}
function render(){clearInterval(S.timer);if(S.view!=="app"||S.nav!=="practice"||!S.run||S.sel){}; $("app").innerHTML=S.view==="landing"?landing():S.view==="onboard"?onboardView():S.view==="plan"?planView():app()}
render();
</script>
</body>
</html>
